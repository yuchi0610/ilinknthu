<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>書法 AR 體驗</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

      /* 讓 engine 控制 canvas，不要自己設寬高 */
      canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100% !important;
        height: 100% !important;
      }

      #start-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #111;
        z-index: 500;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: sans-serif; color: #fff; text-align: center; padding: 24px;
      }
      #start-screen h1 { font-size: 22px; margin-bottom: 8px; }
      #start-screen p { font-size: 14px; opacity: 0.6; margin-bottom: 32px; }
      #start-btn {
        padding: 16px 40px; border-radius: 40px; border: none;
        background: #fff; color: #111;
        font-size: 18px; font-weight: 600; cursor: pointer;
      }

      #scan-hint {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        text-align: center; color: #fff;
        z-index: 100; pointer-events: none;
        font-family: sans-serif; display: none;
        transition: opacity 0.5s;
      }
      #scan-hint .icon { font-size: 52px; margin-bottom: 12px; display: block; animation: float 2s ease-in-out infinite; }
      #scan-hint p { font-size: 16px; opacity: 0.85; }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }

      #ar-overlay {
        display: none; position: fixed;
        bottom: 0; left: 0; right: 0;
        padding: 0 24px 48px;
        z-index: 200; flex-direction: column; align-items: center;
      }
      #ar-overlay.visible { display: flex; }
      .ar-card {
        width: 100%; max-width: 400px;
        background: rgba(0,0,0,0.75);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 20px; padding: 20px 24px;
        color: #fff; font-family: sans-serif;
        animation: slideUp 0.4s ease;
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .ar-card h2 { font-size: 13px; opacity: 0.55; margin-bottom: 6px; font-weight: 400; }
      .ar-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
      .ar-card p { font-size: 13px; opacity: 0.5; margin-bottom: 20px; }
      .ar-btn {
        display: block; width: 100%; padding: 14px;
        border-radius: 12px; border: none;
        background: #fff; color: #111;
        font-size: 16px; font-weight: 600;
        text-align: center; text-decoration: none;
      }
    </style>
  </head>
  <body>
    <canvas id="xr-canvas"></canvas>

    <div id="start-screen">
      <div style="font-size:52px;margin-bottom:16px;">🖌️</div>
      <h1>書法 AR 體驗</h1>
      <p>點擊下方按鈕啟動相機</p>
      <button id="start-btn">啟動 AR</button>
    </div>

    <div id="scan-hint">
      <span class="icon">📷</span>
      <p>將相機對準書法作品</p>
    </div>

    <div id="ar-overlay">
      <div class="ar-card">
        <h2>作品辨識成功</h2>
        <h1 id="artwork-title"></h1>
        <p id="artwork-desc"></p>
        <a id="artwork-link" class="ar-btn" href="#" target="_blank" rel="noopener">前往作品網頁 →</a>
      </div>
    </div>

    <script src="app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
      async
      crossorigin="anonymous"
      data-preload-chunks="slam">
    </script>
  </body>
</html>
